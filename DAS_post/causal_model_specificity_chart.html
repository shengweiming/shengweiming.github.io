
<div style="position: relative; width: 100%; height: 300px;">
  <canvas id="specChart"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const textColor = isDark ? '#e0e0e0' : '#2C2C2A';
const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
new Chart(document.getElementById('specChart'), {
  type: 'bar',
  data: {
    labels: ['Correct model\n(neg + lex entail)', 'Shuffled\ncounterfactual labels', 'Random\nbinary variables'],
    datasets: [{
      data: [0.952, 0.507, 0.503],
      backgroundColor: ['#534AB7', '#B4B2A9', '#B4B2A9'],
      borderColor: ['#3C3489', '#888780', '#888780'],
      borderWidth: 1,
      barThickness: 64,
      borderRadius: 4
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    indexAxis: 'y',
    scales: {
      x: {
        min: 0, max: 1.0,
        ticks: { color: textColor, font: { size: 12 }, callback: v => v.toFixed(1) },
        grid: { color: gridColor }
      },
      y: {
        ticks: { color: textColor, font: { size: 12 } },
        grid: { display: false }
      }
    },
    plugins: {
      legend: { display: false },
      annotation: {
        annotations: {
          chanceLine: {
            type: 'line',
            xMin: 0.5, xMax: 0.5,
            borderColor: isDark ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.2)',
            borderWidth: 1,
            borderDash: [4,4],
            label: {
              display: true,
              content: 'chance',
              position: 'start',
              color: isDark ? '#aaa' : '#888',
              font: { size: 11, style: 'italic' },
              backgroundColor: 'transparent'
            }
          }
        }
      }
    }
  }
});
</script>
