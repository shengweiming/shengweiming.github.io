
<div style="position: relative; width: 100%; height: 280px;">
  <canvas id="randChart"></canvas>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const textColor = isDark ? '#e0e0e0' : '#2C2C2A';
const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
new Chart(document.getElementById('randChart'), {
  type: 'bar',
  data: {
    labels: ['Trained (256d)', 'Random (64d)', 'Random (128d)', 'Random (256d)'],
    datasets: [{
      data: [0.952, 0.360, 0.385, 0.393],
      backgroundColor: ['#534AB7', '#D85A30', '#D85A30', '#D85A30'],
      borderColor: ['#3C3489', '#993C1D', '#993C1D', '#993C1D'],
      borderWidth: 1,
      barThickness: 52,
      borderRadius: 4
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    scales: {
      y: {
        min: 0, max: 1.05,
        ticks: { color: textColor, font: { size: 12 }, callback: v => v.toFixed(1) },
        grid: { color: gridColor }
      },
      x: {
        ticks: { color: textColor, font: { size: 12 } },
        grid: { display: false }
      }
    },
    plugins: {
      legend: { display: false },
      annotation: {
        annotations: {
          chanceLine: {
            type: 'line',
            yMin: 0.5, yMax: 0.5,
            borderColor: isDark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.15)',
            borderWidth: 1,
            borderDash: [4,4]
          }
        }
      }
    }
  }
});
</script>
<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px; font-size: 12px; color: var(--color-text-secondary);">
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #534AB7;"></span>Trained model</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #D85A30;"></span>Random model</span>
</div>
